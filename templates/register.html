<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | HealthAI</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{

            margin:0;

            min-height:100vh;

            background:

            linear-gradient(
                135deg,
                #020617,
                #0f172a,
                #1e3a8a,
                #2563eb
            );

            overflow:hidden;

            position:relative;
        }

        /* ANIMATED BACKGROUND */

        .circle{

            position:absolute;

            border-radius:50%;

            background:rgba(255,255,255,0.08);

            animation: float 8s infinite ease-in-out;
        }

        .circle:nth-child(1){

            width:250px;
            height:250px;

            top:-80px;
            left:-60px;
        }

        .circle:nth-child(2){

            width:350px;
            height:350px;

            bottom:-120px;
            right:-120px;

            animation-delay:2s;
        }

        .circle:nth-child(3){

            width:180px;
            height:180px;

            top:40%;
            left:60%;

            animation-delay:4s;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-25px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        /* CONTAINER */

        .register-container{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            position:relative;

            z-index:2;
        }

        /* CARD */

        .register-card{

            width:100%;
            max-width:520px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(20px);

            border-radius:35px;

            padding:50px;

            box-shadow:0 10px 40px rgba(0,0,0,0.4);

            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo{

            text-align:center;

            color:white;

            margin-bottom:35px;
        }

        .logo i{

            font-size:70px;

            margin-bottom:15px;

            background:linear-gradient(
                135deg,
                #14b8a6,
                #3b82f6
            );

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;
        }

        .logo h1{

            font-weight:700;

            font-size:42px;
        }

        .logo p{

            color:#cbd5e1;

            margin-top:10px;
        }

        /* INPUTS */

        .form-control,
        .form-select{

            background:rgba(255,255,255,0.12);

            border:none;

            border-radius:16px;

            padding:16px;

            color:white;

            margin-bottom:20px;
        }

        .form-control::placeholder{

            color:#cbd5e1;
        }

        .form-control:focus,
        .form-select:focus{

            box-shadow:none;

            border:2px solid #14b8a6;

            background:rgba(255,255,255,0.15);

            color:white;
        }

        /* BUTTON */

        .register-btn{

            width:100%;

            padding:16px;

            border:none;

            border-radius:18px;

            background:linear-gradient(
                135deg,
                #2563eb,
                #14b8a6
            );

            color:white;

            font-size:18px;

            font-weight:600;

            transition:0.4s;
        }

        .register-btn:hover{

            transform:scale(1.03);

            box-shadow:0 10px 25px rgba(37,99,235,0.4);
        }

        /* LOGIN LINK */

        .login-link{

            text-align:center;

            margin-top:25px;

            color:#cbd5e1;
        }

        .login-link a{

            color:#14b8a6;

            text-decoration:none;

            font-weight:600;
        }

        .login-link a:hover{

            color:#3b82f6;
        }

    </style>

</head>

<body>

    <!-- BACKGROUND CIRCLES -->

    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <!-- REGISTER FORM -->

    <div class="register-container">

        <div class="register-card">

            <div class="logo">

                <i class="fa-solid fa-heart-pulse"></i>

                <h1>HealthAI</h1>

                <p>

                    Create your AI Healthcare Account

                </p>

            </div>

            <form method="POST">

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Full Name"
                    required
                >

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Email Address"
                    required
                >

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Password"
                    required
                >

                <select
                    name="role"
                    class="form-select"
                    required
                >

                    <option value="">

                        Select Role

                    </option>

                    <option value="patient">

                        Patient

                    </option>

                    <option value="doctor">

                        Doctor

                    </option>

                    <option value="admin">

                        Admin

                    </option>

                </select>

                <button class="register-btn">

                    <i class="fa-solid fa-user-plus"></i>

                    Create Account

                </button>

            </form>

            <div class="login-link">

                Already have an account?

                <a href="/login">

                    Login Here

                </a>

            </div>

        </div>

    </div>

</body>

</html>
