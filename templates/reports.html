<!DOCTYPE html>
<html>

<head>

    <title>Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#020617;color:white;">

<div class="container mt-5">

    <h1 class="mb-4">

        AI Healthcare Reports

    </h1>

    <div class="row">

        {% for report in reports %}

        <div class="col-md-4 mb-4">

            <div class="card bg-dark text-white p-4 rounded-4">

                <h4>{{ report[0] }}</h4>

                <p>Disease: {{ report[1] }}</p>

                <p>Severity: {{ report[2] }}</p>

                <p>Risk: {{ report[3] }}</p>

                <a href="/generate_report">

                    <button class="btn btn-danger">

                        Download PDF

                    </button>

                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
