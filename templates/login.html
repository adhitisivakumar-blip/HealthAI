<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - HealthAI</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- GOOGLE FONTS -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{

            background: linear-gradient(
                135deg,
                #020617,
                #0f172a,
                #1e3a8a,
                #2563eb
            );

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            overflow: hidden;
        }

        /* BACKGROUND CIRCLES */

        .circle1{

            position: absolute;

            width: 300px;
            height: 300px;

            background: #38bdf8;

            border-radius: 50%;

            top: -100px;
            left: -100px;

            opacity: 0.3;

            filter: blur(40px);
        }

        .circle2{

            position: absolute;

            width: 350px;
            height: 350px;

            background: #14b8a6;

            border-radius: 50%;

            bottom: -120px;
            right: -120px;

            opacity: 0.3;

            filter: blur(40px);
        }

        /* LOGIN CARD */

        .login-card{

            width: 450px;

            background: rgba(255,255,255,0.08);

            border-radius: 30px;

            padding: 50px;

            backdrop-filter: blur(15px);

            box-shadow: 0 8px 32px rgba(0,0,0,0.3);

            color: white;

            position: relative;

            z-index: 10;
        }

        .login-card h1{

            text-align: center;

            margin-bottom: 35px;

            font-weight: 700;
        }

        .login-card h1 span{

            color: #38bdf8;
        }

        /* INPUTS */

        .form-control{

            height: 55px;

            border-radius: 15px;

            border: none;

            background: rgba(255,255,255,0.15);

            color: white;

            padding-left: 15px;

            margin-bottom: 20px;
        }

        .form-control::placeholder{

            color: #cbd5e1;
        }

        .form-control:focus{

            box-shadow: none;

            border: 2px solid #38bdf8;

            background: rgba(255,255,255,0.2);

            color: white;
        }

        /* BUTTON */

        .login-btn{

            width: 100%;

            height: 55px;

            border: none;

            border-radius: 15px;

            background: linear-gradient(
                135deg,
                #2563eb,
                #38bdf8
            );

            color: white;

            font-size: 18px;

            font-weight: 600;

            transition: 0.4s;
        }

        .login-btn:hover{

            transform: translateY(-4px);

            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* ICON */

        .icon-box{

            width: 90px;
            height: 90px;

            margin: auto;

            margin-bottom: 25px;

            border-radius: 50%;

            background: linear-gradient(
                135deg,
                #2563eb,
                #38bdf8
            );

            display: flex;

            justify-content: center;

            align-items: center;

            font-size: 40px;
        }

        /* REGISTER LINK */

        .register-text{

            text-align: center;

            margin-top: 20px;

            color: #cbd5e1;
        }

        .register-text a{

            color: #38bdf8;

            text-decoration: none;

            font-weight: 600;
        }

        .register-text a:hover{

            color: white;
        }

    </style>

</head>

<body>

    <!-- BACKGROUND -->

    <div class="circle1"></div>
    <div class="circle2"></div>

    <!-- LOGIN CARD -->

    <div class="login-card">

        <div class="icon-box">

            <i class="fa-solid fa-heart-pulse"></i>

        </div>

        <h1>

            Welcome to <span>HealthAI</span>

        </h1>

        <form method="POST">

            <input
                class="form-control"
                type="email"
                name="email"
                placeholder="Enter Email"
                required
            >

            <input
                class="form-control"
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button class="login-btn">

                <i class="fa-solid fa-right-to-bracket"></i>

                Login

            </button>

        </form>

        <div class="register-text">

            Don't have an account?

            <a href="/register">

                Register Here

            </a>

        </div>

    </div>

</body>

</html>
